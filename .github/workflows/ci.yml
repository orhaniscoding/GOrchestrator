name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync

      - name: Run tests
        run: uv run pytest tests/ -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Check imports compile
        run: |
          uv run python -c "from src.core.config import Settings, detect_provider"
          uv run python -c "from src.core.manager import ManagerAgent"
          uv run python -c "from src.core.engine import SessionEngine"
          uv run python -c "from src.core.sub_manager import SubManagerRegistry"
          uv run python -c "from src.core.llm_pool import LLMPool"
          uv run python -c "from src.core.team import TeamRegistry"
          uv run python -c "from src.commands.parser import CommandParser"
          uv run python -c "from src.commands.handlers import CommandHandler"
