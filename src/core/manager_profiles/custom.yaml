# Custom Manager Profile Template
# Copy this file to create your own manager configuration
# Rename to something descriptive (e.g., 'my-manager.yaml')

name: "My Custom Manager"
description: "Custom manager configuration"

# LLM Configuration
# Options: claude-opus-4-6-thinking, claude-3-5-sonnet-20241022, gpt-4o, gemini-2.0-flash-exp, etc.
model: "claude-opus-4-6-thinking"

# API Configuration
# For LiteLLM proxy: http://127.0.0.1:8045
# For direct Anthropic API: https://api.anthropic.com
# For direct OpenAI API: https://api.openai.com/v1
api_base: "http://127.0.0.1:8045"
api_key: "sk-your-api-key-here"

# System Prompt (optional - remove or set to null to use default)
system_prompt: |
  You are GOrchestrator, a specialized AI assistant for [your use case].
  
  Customize this prompt to match your specific needs.

# LLM Parameters (optional - remove or set to null for defaults)
temperature: 0.7
max_tokens: 4096

# Extended Thinking (optional - remove or set to null for disabled)
# Only works with *-thinking models
thinking:
  enabled: true
  budget_tokens: 10000
